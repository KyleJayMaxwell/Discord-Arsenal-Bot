# ─────────────────────────────────────────────────────────────────────────────
# Arsenal Match Reminder — GitHub Actions Workflow
# ─────────────────────────────────────────────────────────────────────────────
#
# Runs every 30 minutes. index.js handles all logic internally:
#
#   3am window  → calls football API, stores schedule in GitHub Variables
#   Other runs  → reads schedule, sends message if it's time, marks sent
#
# State is persisted via GitHub Actions Variables (not secrets):
#   SCHEDULE_DATE       — date the schedule was built for (YYYY-MM-DD)
#   SCHEDULE_SEND_TIME  — time to send the message (HH:MM in LA time)
#   SCHEDULE_HAS_MATCH  — "true" or "false"
#   SCHEDULE_SENT       — "true" once the message has been sent today
#
# These variables are created automatically on first run.
#
# SEND TIME RULES
#   Game today, kickoff at/after 7:30am → send at 7:00am
#   Game today, kickoff before 7:30am   → send 30 mins before kickoff
#   No game today                       → send at 6:30am
#   All times use America/Los_Angeles (PST/PDT auto-handled)
#
# SECRETS REQUIRED (repo Settings → Secrets and variables → Actions → Secrets)
#   FOOTBALL_API_KEY    → from football-data.org
#   DISCORD_WEBHOOK_URL → from your Discord channel's Integrations settings
#   VARIABLES_TOKEN     → fine-grained PAT with Variables: read/write on this repo
#
# PERMISSIONS REQUIRED
#   GITHUB_TOKEN cannot write repository Variables — a fine-grained PAT is required.
#   Create one at GitHub → Settings → Developer settings → Personal access tokens
#   → Fine-grained tokens. Scope it to this repo, Variables: read/write.
#   Store it as a secret named VARIABLES_TOKEN.
#
# MANUAL TESTING
#   Actions tab → Arsenal Match Reminder → Run workflow → test-webhook
# ─────────────────────────────────────────────────────────────────────────────

name: Arsenal Match Reminder

on:
  schedule:
    # Every 30 minutes — index.js decides what to do based on current LA time
    - cron: '0,30 * * * *'

  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'test-webhook'
        type: choice
        options:
          - test-webhook  # Send immediately, no scheduling logic
          - normal        # Run normal scheduling logic right now

# Grant the workflow permission to read contents and run actions
permissions:
  contents: read
  actions: write

jobs:
  remind:
    name: Arsenal Reminder
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - run: npm install

      - name: Run Arsenal reminder
        run: node index.js ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'test-webhook' && 'test-webhook' || '' }}
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # GITHUB_TOKEN cannot write Variables — requires a fine-grained PAT with Variables: read/write
          GH_TOKEN: ${{ secrets.VARIABLES_TOKEN }}
          # GITHUB_REPOSITORY is auto-provided — e.g. "yourusername/arsenal-bot"
          GITHUB_REPOSITORY: ${{ github.repository }}