# ─────────────────────────────────────────────────────────────────────────────
# Arsenal Match Reminder — GitHub Actions Workflow
# ─────────────────────────────────────────────────────────────────────────────
#
# Runs every 30 minutes. index.js handles all the timing logic internally
# using 'America/Los_Angeles' time — DST is handled automatically, no
# manual UTC offset changes are ever needed in this file.
#
# HOW IT WORKS
#   On match days:  sends a reminder 30 mins before kickoff (min 7:00 AM)
#   On non-match days: sends a "no match today" message with a countdown at 7:00 AM
#
# SECRETS REQUIRED (repo Settings → Secrets and variables → Actions → Secrets)
#   FOOTBALL_API_KEY    → from football-data.org
#   DISCORD_WEBHOOK_URL → from your Discord channel's Integrations settings
#
# MANUAL TESTING
#   Actions tab → Arsenal Match Reminder → Run workflow → test-webhook
#   Sends a message immediately regardless of time or match schedule.
# ─────────────────────────────────────────────────────────────────────────────

name: Arsenal Match Reminder

on:
  # Run every 30 minutes so we can catch the exact reminder window.
  # All timing decisions are made inside index.js, not here.
  schedule:
    - cron: '0,30 * * * *'

  # Manual trigger for testing from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      mode:
        description: 'test-webhook sends immediately, ignoring all time/match logic'
        required: true
        default: 'test-webhook'
        type: choice
        options:
          - test-webhook

jobs:
  send-reminder:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run Arsenal reminder
        # Pass 'test-webhook' for manual runs, nothing for scheduled runs
        run: node index.js ${{ github.event_name == 'workflow_dispatch' && inputs.mode || '' }}
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}